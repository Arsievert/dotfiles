# Kitty terminal configuration

# Font
font_family      Berkeley Mono
font_size 16.0

# Cursor
cursor_shape block

# Mouse
open_url_with default
detect_urls yes
show_hyperlink_targets no

# Tab bar
tab_bar_edge top
tab_bar_style fade

# Editor
editor /opt/homebrew/bin/emacs

# Gruvbox Dark Color Scheme
foreground #ebdbb2
background #282828
selection_background #928374
selection_foreground #ebdbb2
url_color #83a598
cursor #ebdbb2
cursor_text_color #282828

# Tab colors
active_tab_foreground #282828
active_tab_background #8ec07c
inactive_tab_foreground #ebdbb2
inactive_tab_background #3c3836

# Normal colors
color0 #282828
color1 #cc241d
color2 #98971a
color3 #d79921
color4 #458588
color5 #b16286
color6 #689d6a
color7 #a89984

# Bright colors
color8 #928374
color9 #fb4934
color10 #b8bb26
color11 #fabd2f
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2
